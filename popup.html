<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 320px; padding: 14px; margin: 0; color: #111; }
    h2 { margin: 0 0 10px; font-size: 15px; }
    label { font-size: 11px; color: #555; display: block; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    button { width: 100%; padding: 10px; font-size: 13px; background: #ff9900; border: 1px solid #e88e00; color: #111; cursor: pointer; margin-top: 12px; border-radius: 4px; font-weight: 600; }
    button.secondary { background: #fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 12px; color: #444; min-height: 16px; }
    .hint { font-size: 11px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>Amazon Search Scraper</h2>
  <label for="query">Search term</label>
  <input id="query" type="text" placeholder="e.g. wireless headphones" autofocus />
  <div class="row">
    <div>
      <label for="pages">Pages</label>
      <input id="pages" type="number" min="1" max="100" value="10" />
    </div>
    <div>
      <label for="domain">Domain</label>
      <input id="domain" type="text" value="amazon.com" />
    </div>
  </div>
  <label for="maxItems">Max items</label>
  <input id="maxItems" type="number" min="10" max="10000" value="2000" />
  <button id="start">Start scraping</button>
  <button id="open" class="secondary">Open last results</button>
  <div id="status"></div>
  <div class="hint">Tip: results display live. CSV / Excel download from the results tab.</div>
  <script src="popup.js"></script>
</body>
</html>
